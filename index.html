<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ahmad Bilal Qureshi — Software Engineer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #EEF2FF;
      --surface:     #FFFFFF;
      --primary:     #3730A3;
      --primary-mid: #4F46E5;
      --primary-light:#C7D2FE;
      --text:        #1E1B4B;
      --text-muted:  #6366A0;
      --border:      #DDE2F5;
      --accent:      #818CF8;
      --tag-bg:      #EEF2FF;
      --tag-border:  #C7D2FE;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(238,242,255,0.82);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }

    .nav-inner {
      max-width: 1100px; margin: 0 auto;
      padding: 0 2rem;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 1.1rem;
      color: var(--primary); letter-spacing: -0.02em;
      text-decoration: none;
    }

    .nav-links {
      display: flex; gap: 2rem; list-style: none;
    }

    .nav-links a {
      font-size: 0.875rem; font-weight: 500;
      color: var(--text-muted); text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--primary); }

    .nav-cta {
      background: var(--primary);
      color: #fff !important;
      padding: 0.45rem 1.1rem;
      border-radius: 6px;
      font-size: 0.85rem !important;
      transition: background 0.2s !important;
    }
    .nav-cta:hover { background: var(--primary-mid) !important; color: #fff !important; }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex; align-items: center;
      padding: 0 2rem;
      position: relative; overflow: hidden;
    }

    /* Signature element: large typographic ghost monogram */
    .hero-monogram {
      position: absolute;
      right: -2%;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Syne', sans-serif;
      font-size: clamp(14rem, 28vw, 26rem);
      font-weight: 800;
      color: transparent;
      -webkit-text-stroke: 1.5px var(--primary-light);
      user-select: none;
      pointer-events: none;
      letter-spacing: -0.06em;
      line-height: 1;
      opacity: 0.55;
    }

    .hero-inner {
      max-width: 1100px; margin: 0 auto;
      padding-top: 64px;
      position: relative; z-index: 2;
    }

    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.78rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--primary-mid);
      background: var(--primary-light);
      padding: 0.35rem 0.9rem;
      border-radius: 100px;
      margin-bottom: 1.75rem;
    }

    .hero-eyebrow::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--primary-mid);
      display: block;
    }

    .hero-name {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.0;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .hero-name span {
      color: var(--primary);
    }

    .hero-tagline {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.2rem, 2.4vw, 1.75rem);
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      letter-spacing: -0.01em;
    }

    .hero-desc {
      font-size: 1.05rem;
      color: var(--text-muted);
      max-width: 520px;
      line-height: 1.75;
      margin-bottom: 2.5rem;
    }

    .hero-actions {
      display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      padding: 0.75rem 1.75rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      border: none; cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s, background 0.18s;
      display: inline-flex; align-items: center; gap: 0.5rem;
    }
    .btn-primary:hover {
      background: var(--primary-mid);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(55,48,163,0.25);
    }

    .btn-ghost {
      background: transparent;
      color: var(--primary);
      padding: 0.72rem 1.75rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      border: 1.5px solid var(--primary-light);
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
    }
    .btn-ghost:hover {
      border-color: var(--primary);
      background: rgba(55,48,163,0.04);
    }

    .hero-stats {
      margin-top: 4rem;
      display: flex; gap: 3rem; flex-wrap: wrap;
    }

    .stat-block { display: flex; flex-direction: column; gap: 0.2rem; }
    .stat-number {
      font-family: 'Syne', sans-serif;
      font-size: 2rem; font-weight: 800;
      color: var(--primary); letter-spacing: -0.03em;
    }
    .stat-label {
      font-size: 0.8rem; font-weight: 500;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── SECTION SHARED ── */
    section { padding: 6rem 2rem; }
    .section-inner { max-width: 1100px; margin: 0 auto; }

    .section-label {
      font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--primary-mid);
      margin-bottom: 0.75rem;
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.8rem, 3.5vw, 2.75rem);
      font-weight: 800; letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 0.75rem;
    }

    .section-sub {
      font-size: 1rem; color: var(--text-muted);
      max-width: 540px; line-height: 1.7;
      margin-bottom: 3rem;
    }

    /* ── ABOUT ── */
    #about { background: var(--surface); }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: 5rem;
      align-items: center;
    }

    .about-avatar-wrap {
      position: relative;
      width: 100%; max-width: 360px;
    }

    .about-avatar-bg {
      position: absolute;
      inset: -12px -12px 12px 12px;
      background: var(--primary-light);
      border-radius: 16px;
      z-index: 0;
    }

    .about-avatar {
      position: relative; z-index: 1;
      width: 100%; aspect-ratio: 1;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-mid) 60%, var(--accent) 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 6rem; font-weight: 800;
      color: rgba(255,255,255,0.9);
      letter-spacing: -0.04em;
      user-select: none;
    }

    .about-card {
      position: absolute;
      bottom: -1.5rem; right: -1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1.2rem;
      box-shadow: 0 4px 16px rgba(55,48,163,0.1);
      z-index: 2;
      display: flex; align-items: center; gap: 0.75rem;
    }

    .about-card-icon {
      width: 36px; height: 36px;
      background: var(--bg);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }

    .about-card-text { display: flex; flex-direction: column; }
    .about-card-val {
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 1rem;
      color: var(--text); line-height: 1.1;
    }
    .about-card-key {
      font-size: 0.72rem; color: var(--text-muted);
      font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;
    }

    .about-body p {
      font-size: 1rem; color: var(--text-muted);
      line-height: 1.8; margin-bottom: 1rem;
    }

    .about-tags {
      display: flex; flex-wrap: wrap; gap: 0.5rem;
      margin-top: 1.5rem;
    }

    .tag {
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      color: var(--primary);
      font-size: 0.8rem; font-weight: 500;
      padding: 0.3rem 0.75rem;
      border-radius: 100px;
    }

    /* ── SKILLS ── */
    #skills { background: var(--bg); }

    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.25rem;
    }

    .skill-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .skill-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(55,48,163,0.1);
      border-color: var(--primary-light);
    }

    .skill-icon {
      font-size: 1.6rem;
      margin-bottom: 1rem;
      display: block;
    }

    .skill-card h3 {
      font-family: 'Syne', sans-serif;
      font-size: 1rem; font-weight: 700;
      color: var(--text); margin-bottom: 0.5rem;
    }

    .skill-card p {
      font-size: 0.85rem; color: var(--text-muted);
      line-height: 1.6; margin-bottom: 1.2rem;
    }

    .skill-bar-wrap {
      height: 4px; background: var(--bg);
      border-radius: 100px; overflow: hidden;
    }

    .skill-bar {
      height: 100%; border-radius: 100px;
      background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
      transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
    }

    .skill-level {
      display: flex; justify-content: space-between;
      margin-top: 0.5rem;
    }

    .skill-level span {
      font-size: 0.72rem; font-weight: 500;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;
    }

    .skill-level strong {
      font-size: 0.72rem; font-weight: 600; color: var(--primary);
    }

    /* ── EXPERIENCE ── */
    #experience { background: var(--surface); }

    .timeline {
      position: relative;
      display: flex; flex-direction: column; gap: 2rem;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 15px; top: 6px; bottom: 6px;
      width: 1px;
      background: linear-gradient(to bottom, var(--primary-light), var(--border));
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    .timeline-dot {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--primary-light);
      display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 1;
      transition: border-color 0.2s;
      flex-shrink: 0;
    }

    .timeline-item:hover .timeline-dot {
      border-color: var(--primary);
    }

    .timeline-dot-inner {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--primary);
    }

    .timeline-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem 1.75rem;
      transition: border-color 0.2s;
    }
    .timeline-item:hover .timeline-card { border-color: var(--primary-light); }

    .timeline-header {
      display: flex; flex-wrap: wrap;
      justify-content: space-between; align-items: flex-start;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .timeline-role {
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem; font-weight: 700;
      color: var(--text);
    }

    .timeline-company {
      font-size: 0.9rem; font-weight: 500;
      color: var(--primary);
    }

    .timeline-period {
      font-size: 0.78rem; font-weight: 500;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.25rem 0.7rem;
      border-radius: 100px;
      white-space: nowrap;
    }

    .timeline-desc {
      font-size: 0.9rem; color: var(--text-muted);
      line-height: 1.75; margin-top: 0.75rem;
    }

    .timeline-chips {
      display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 1rem;
    }

    .chip {
      font-size: 0.72rem; font-weight: 500;
      color: var(--primary-mid);
      background: var(--surface);
      border: 1px solid var(--tag-border);
      padding: 0.2rem 0.6rem;
      border-radius: 100px;
    }

    /* ── PROJECTS ── */
    #projects { background: var(--bg); }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1.5rem;
    }

    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .project-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 40px rgba(55,48,163,0.12);
      border-color: var(--primary-light);
    }

    .project-thumb {
      width: 100%; height: 180px;
      display: flex; align-items: center; justify-content: center;
      font-size: 3.5rem;
      position: relative; overflow: hidden;
    }

    .project-thumb-1 { background: linear-gradient(135deg, #3730A3 0%, #6366F1 100%); }
    .project-thumb-2 { background: linear-gradient(135deg, #1E1B4B 0%, #4338CA 100%); }
    .project-thumb-3 { background: linear-gradient(135deg, #4F46E5 0%, #818CF8 100%); }
    .project-thumb-4 { background: linear-gradient(135deg, #312E81 0%, #6366F1 80%); }

    .project-thumb-label {
      position: absolute; top: 1rem; right: 1rem;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(6px);
      color: #fff;
      font-size: 0.7rem; font-weight: 600;
      padding: 0.25rem 0.65rem;
      border-radius: 100px;
      letter-spacing: 0.05em; text-transform: uppercase;
    }

    .project-body { padding: 1.5rem 1.75rem; }

    .project-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem; font-weight: 700;
      color: var(--text); margin-bottom: 0.5rem;
    }

    .project-desc {
      font-size: 0.875rem; color: var(--text-muted);
      line-height: 1.7; margin-bottom: 1.25rem;
    }

    .project-footer {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 0.75rem;
    }

    .project-stack {
      display: flex; gap: 0.4rem; flex-wrap: wrap;
    }

    .project-link {
      font-size: 0.8rem; font-weight: 600;
      color: var(--primary); text-decoration: none;
      display: flex; align-items: center; gap: 0.3rem;
      transition: gap 0.15s;
    }
    .project-link:hover { gap: 0.5rem; }

    /* ── CONTACT ── */
    #contact { background: var(--surface); }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: start;
    }

    .contact-links {
      display: flex; flex-direction: column; gap: 1rem;
      margin-top: 2rem;
    }

    .contact-link {
      display: flex; align-items: center; gap: 1rem;
      padding: 1rem 1.25rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      transition: border-color 0.18s, transform 0.18s;
    }
    .contact-link:hover {
      border-color: var(--primary-light);
      transform: translateX(4px);
    }

    .contact-link-icon {
      width: 42px; height: 42px;
      border-radius: 9px;
      background: var(--primary-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .contact-link-body { flex: 1; }
    .contact-link-label {
      font-size: 0.72rem; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .contact-link-val {
      font-size: 0.95rem; font-weight: 500;
      color: var(--text);
    }

    .contact-link-arrow {
      color: var(--text-muted);
      font-size: 1rem;
    }

    /* Contact form */
    .form-group { margin-bottom: 1.25rem; }

    .form-label {
      display: block;
      font-size: 0.82rem; font-weight: 600;
      color: var(--text); margin-bottom: 0.5rem;
    }

    .form-input, .form-textarea {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      transition: border-color 0.18s, box-shadow 0.18s;
      outline: none;
      resize: none;
    }

    .form-input:focus, .form-textarea:focus {
      border-color: var(--primary-mid);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }

    .form-textarea { height: 120px; }

    /* ── FOOTER ── */
    footer {
      background: var(--text);
      color: rgba(255,255,255,0.5);
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .footer-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center;
      justify-content: space-between; flex-wrap: wrap; gap: 1rem;
    }

    .footer-logo {
      font-family: 'Syne', sans-serif;
      font-size: 1rem; font-weight: 700;
      color: #fff; text-decoration: none;
    }

    .footer-copy {
      font-size: 0.82rem;
    }

    .footer-links {
      display: flex; gap: 1.5rem;
    }

    .footer-links a {
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      font-size: 0.82rem;
      transition: color 0.18s;
    }
    .footer-links a:hover { color: #fff; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    @keyframes float {
      0%   { transform: translateY(-50%) translateX(0); }
      50%  { transform: translateY(-50%) translateX(10px); }
      100% { transform: translateY(-50%) translateX(0); }
    }

    .hero-monogram { animation: float 8s ease-in-out infinite; }

    .fade-up {
      opacity: 0; transform: translateY(28px);
      transition: opacity 0.65s cubic-bezier(.4,0,.2,1), transform 0.65s cubic-bezier(.4,0,.2,1);
    }
    .fade-up.visible { opacity: 1; transform: translateY(0); }

    .hero-eyebrow  { animation: fadeUp 0.6s 0.1s both; }
    .hero-name     { animation: fadeUp 0.6s 0.2s both; }
    .hero-tagline  { animation: fadeUp 0.6s 0.3s both; }
    .hero-desc     { animation: fadeUp 0.6s 0.4s both; }
    .hero-actions  { animation: fadeUp 0.6s 0.5s both; }
    .hero-stats    { animation: fadeUp 0.6s 0.65s both; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .nav-links { display: none; }

      .about-grid { grid-template-columns: 1fr; gap: 3rem; }
      .about-avatar-wrap { max-width: 240px; }

      .contact-grid { grid-template-columns: 1fr; gap: 2.5rem; }

      .hero-stats { gap: 2rem; }

      .timeline::before { left: 11px; }
      .timeline-dot { width: 24px; height: 24px; }
      .timeline-dot-inner { width: 8px; height: 8px; }

      section { padding: 4rem 1.25rem; }
      .hero { padding: 0 1.25rem; }
      .hero-monogram { opacity: 0.2; }

      .footer-inner { flex-direction: column; text-align: center; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *:
